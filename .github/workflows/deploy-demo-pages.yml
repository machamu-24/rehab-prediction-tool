name: Deploy static demo to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static demo
        run: pnpm build:demo
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages --depth=1
          rm -rf /tmp/rehab-prediction-pages
          git worktree add --detach /tmp/rehab-prediction-pages origin/gh-pages
          find /tmp/rehab-prediction-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/public/. /tmp/rehab-prediction-pages/
          cd /tmp/rehab-prediction-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Deploy static demo"
          git push origin HEAD:gh-pages
